# MVP: BLE-Tastatur fuer Switch Control / Switch Access.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# F3.1: Eine WS2812-Status-LED, Datenpin D8/P1.13.
# Die LED wird vom eigenen BLE-Status-Modul direkt gesteuert.
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_ZMK_BLE_STATUS_LED=y
CONFIG_ZMK_BLE_STATUS_LED_BRIGHTNESS=20
CONFIG_ZMK_BLE_STATUS_LED_POLL_INTERVAL_MS=500
